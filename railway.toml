# Railway deployment configuration.
# Docs: https://docs.railway.app/reference/config-as-code
#
# Build uses the Dockerfile at repo root (uv-based).
# On deploy Railway injects $PORT and $DATABASE_URL automatically if a
# PostgreSQL service is attached to this service. Everything else — in Variables.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Alembic migrations run on every deploy, then the bot starts (long-polling).
# `.venv/bin` is on PATH via the Dockerfile — no `uv run` wrapper.
# Extra `echo` markers + `python -u` for quick post-mortem if startup stalls.
startCommand = "echo '[run] alembic...' && alembic upgrade head && echo '[run] alembic ok, starting python...' && python -u -m src.bot.main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
